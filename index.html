<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Web Musik</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
margin:0;
padding:20px;
display:flex;
gap:20px;
}

.main{
flex:1;
}

h1{
margin-bottom:20px;
color:#1db954;
}

#search{
width:100%;
padding:12px;
border-radius:8px;
border:none;
margin-bottom:20px;
font-size:16px;
}

#playlist{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:15px;
}

.song{
background:#181818;
padding:15px;
border-radius:10px;
}

.song p{
margin-bottom:10px;
font-weight:bold;
}

audio{
width:100%;
}

/* sidebar */

.sidebar{
width:280px;
background:#181818;
padding:20px;
border-radius:10px;
}

.sidebar h2{
margin-bottom:15px;
}

.sidebar input{
width:100%;
padding:10px;
margin-bottom:10px;
border:none;
border-radius:6px;
}

.sidebar button{
width:100%;
padding:10px;
background:#1db954;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

.sidebar button:hover{
background:#1ed760;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="main">

<h1>🎵 Web Musik</h1>

<input id="search" placeholder="Cari lagu...">

<div id="playlist"></div>

</div>

<div class="sidebar">

<h2>Admin</h2>

<div id="loginPanel">

<input id="user" placeholder="username">
<input id="pass" type="password" placeholder="password">

<button onclick="login()">Login</button>

</div>

<div id="adminPanel" class="hidden">

<h3>Upload Lagu</h3>

<input id="title" placeholder="judul lagu">
<input id="url" placeholder="url mp3">

<button onclick="uploadSong()">Upload</button>

</div>

</div>

<script type="module" src="/app.js"></script>

</body>
</html>
