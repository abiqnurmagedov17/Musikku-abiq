<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Web Musik - Spotify Style</title>

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: linear-gradient(135deg, #1a1e2b 0%, #2d1b3a 100%);
  color: #fff;
  font-family: 'Circular', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  min-height: 100vh;
  display: flex;
  padding: 20px;
  gap: 20px;
}

/* Main Content */
.main-content {
  flex: 1;
  max-width: calc(100% - 340px);
}

h2 {
  font-size: 32px;
  margin-bottom: 25px;
  background: linear-gradient(45deg, #1db954, #1ed760);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  display: inline-block;
  letter-spacing: -0.5px;
}

/* Search Bar */
#search {
  width: 100%;
  padding: 15px 20px;
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 30px;
  color: white;
  font-size: 16px;
  margin-bottom: 30px;
  backdrop-filter: blur(10px);
  transition: all 0.3s ease;
}

#search:focus {
  outline: none;
  border-color: #1db954;
  background: rgba(255, 255, 255, 0.15);
  box-shadow: 0 0 20px rgba(29, 185, 84, 0.3);
}

#search::placeholder {
  color: rgba(255, 255, 255, 0.5);
}

/* Playlist Grid */
#playlist {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 20px;
  margin-top: 20px;
}

.song {
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px);
  border-radius: 15px;
  padding: 20px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  transition: all 0.3s ease;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.song::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: linear-gradient(135deg, rgba(29, 185, 84, 0.1), rgba(0, 0, 0, 0));
  opacity: 0;
  transition: opacity 0.3s ease;
}

.song:hover {
  transform: translateY(-5px);
  border-color: #1db954;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
}

.song:hover::before {
  opacity: 1;
}

.song p {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 15px;
  color: white;
  position: relative;
  z-index: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Audio Player */
audio {
  width: 100%;
  height: 40px;
  border-radius: 20px;
  position: relative;
  z-index: 1;
}

audio::-webkit-media-controls-panel {
  background: rgba(0, 0, 0, 0.5);
  border-radius: 20px;
}

audio::-webkit-media-controls-play-button {
  background-color: #1db954;
  border-radius: 50%;
}

audio::-webkit-media-controls-timeline {
  color: #1db954;
}

/* Sidebar */
.sidebar {
  width: 340px;
  background: rgba(0, 0, 0, 0.3);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  padding: 0;
  border: 1px solid rgba(255, 255, 255, 0.1);
  height: fit-content;
  position: sticky;
  top: 20px;
  overflow: hidden;
}

/* Sidebar Header */
.sidebar-header {
  background: rgba(29, 185, 84, 0.2);
  padding: 20px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  display: flex;
  align-items: center;
  gap: 10px;
}

.sidebar-header h3 {
  color: #1db954;
  font-size: 20px;
  margin: 0;
  flex: 1;
}

.sidebar-header svg {
  width: 24px;
  height: 24px;
  fill: #1db954;
}

/* Admin Toggle Buttons Container */
.admin-toggle-container {
  display: flex;
  padding: 15px;
  gap: 10px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.admin-toggle-btn {
  flex: 1;
  padding: 12px;
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 10px;
  color: white;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.3s ease;
  text-align: center;
}

.admin-toggle-btn:hover {
  background: rgba(29, 185, 84, 0.2);
  border-color: #1db954;
}

.admin-toggle-btn.active {
  background: #1db954;
  border-color: #1db954;
  color: white;
}

/* Admin Panel Container */
.admin-panel-container {
  padding: 20px;
  min-height: 300px;
}

/* Admin Panel */
#adminPanel {
  background: rgba(0, 0, 0, 0.3);
  border-radius: 15px;
  padding: 20px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  transition: all 0.3s ease;
}

#adminPanel h3 {
  color: #1db954;
  margin-bottom: 20px;
  font-size: 18px;
  display: flex;
  align-items: center;
  gap: 10px;
}

#adminPanel input {
  width: 100%;
  padding: 12px 15px;
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 10px;
  color: white;
  margin-bottom: 15px;
  font-size: 14px;
}

#adminPanel input:focus {
  outline: none;
  border-color: #1db954;
}

#adminPanel button {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, #1db954, #169c46);
  border: none;
  border-radius: 10px;
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
}

#adminPanel button:hover {
  transform: scale(1.02);
  box-shadow: 0 5px 15px rgba(29, 185, 84, 0.3);
}

/* Login Panel */
#loginPanel {
  background: rgba(0, 0, 0, 0.3);
  border-radius: 15px;
  padding: 20px;
  border: 1px solid rgba(255, 255, 255, 0.1);
}

#loginPanel h3 {
  color: #1db954;
  margin-bottom: 20px;
  font-size: 18px;
}

#loginPanel input {
  width: 100%;
  padding: 12px 15px;
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 10px;
  color: white;
  margin-bottom: 15px;
}

#loginPanel button {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, #1db954, #169c46);
  border: none;
  border-radius: 10px;
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
}

#loginPanel button:hover {
  transform: scale(1.02);
  box-shadow: 0 5px 15px rgba(29, 185, 84, 0.3);
}

/* Hide/Show classes */
.hidden {
  display: none !important;
}

/* Now Playing Bar */
.now-playing {
  margin-top: 20px;
  padding: 15px;
  background: rgba(0, 0, 0, 0.3);
  border-radius: 10px;
  border-left: 3px solid #1db954;
}

.now-playing p {
  color: rgba(255, 255, 255, 0.7);
  font-size: 14px;
  margin-bottom: 5px;
}

.now-playing .song-title {
  color: white;
  font-weight: 600;
  font-size: 16px;
}

/* Volume Control */
.volume-control {
  margin-top: 15px;
  padding: 0 20px 20px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-top: 1px solid rgba(255, 255, 255, 0.1);
}

.volume-control svg {
  width: 20px;
  height: 20px;
  fill: white;
}

.volume-control input {
  flex: 1;
  height: 4px;
  -webkit-appearance: none;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 2px;
}

.volume-control input::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px;
  height: 12px;
  background: #1db954;
  border-radius: 50%;
  cursor: pointer;
}

/* Welcome Message */
.welcome-message {
  padding: 20px;
  text-align: center;
  color: rgba(255, 255, 255, 0.5);
  font-style: italic;
}

/* Responsive */
@media (max-width: 768px) {
  body {
    flex-direction: column;
  }
  
  .main-content {
    max-width: 100%;
  }
  
  .sidebar {
    width: 100%;
    position: static;
  }
  
  #playlist {
    grid-template-columns: 1fr;
  }
}

/* Animations */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.song {
  animation: fadeIn 0.3s ease;
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateX(-10px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

.admin-panel-container > div {
  animation: slideIn 0.3s ease;
}

</style>

</head>

<body>

<div class="main-content">
  <h2>🎵 WEB MUSIK</h2>
  
  <input id="search" placeholder="Cari lagu, artis, atau album...">
  
  <div id="playlist"></div>
  
  <!-- Now Playing Info -->
  <div class="now-playing" id="nowPlaying" style="display: none;">
    <p>Sedang Diputar</p>
    <p class="song-title" id="nowPlayingTitle">-</p>
  </div>
</div>

<div class="sidebar">
  <!-- Sidebar Header -->
  <div class="sidebar-header">
    <svg viewBox="0 0 24 24">
      <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
    </svg>
    <h3>Panel Admin</h3>
  </div>

  <!-- Admin Toggle Buttons -->
  <div class="admin-toggle-container">
    <button class="admin-toggle-btn active" onclick="showLoginPanel()" id="loginBtn">Login</button>
    <button class="admin-toggle-btn" onclick="showUploadPanel()" id="uploadBtn">Upload</button>
  </div>

  <!-- Admin Panel Container -->
  <div class="admin-panel-container">
    <!-- Login Panel -->
    <div id="loginPanel">
      <h3>🔐 Login Admin</h3>
      <input id="user" placeholder="Username">
      <input id="pass" type="password" placeholder="Password">
      <button onclick="login()">Masuk</button>
    </div>

    <!-- Upload Panel (Hidden by default) -->
    <div id="adminPanel" style="display: none;">
      <h3>📤 Upload Lagu</h3>
      <input id="title" placeholder="Judul Lagu">
      <input id="url" placeholder="URL MP3">
      <button onclick="uploadSong()">Upload</button>
    </div>
  </div>
  
  <!-- Volume Control -->
  <div class="volume-control">
    <svg viewBox="0 0 24 24">
      <path d="M3 9v6h4l5 5V4L7 9H3z"/>
    </svg>
    <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1">
  </div>
</div>

<script type="module" src="/app.js"></script>

<script>
// Fungsi untuk menampilkan login panel
window.showLoginPanel = function() {
  document.getElementById('loginPanel').style.display = 'block';
  document.getElementById('adminPanel').style.display = 'none';
  
  // Update active button
  document.getElementById('loginBtn').classList.add('active');
  document.getElementById('uploadBtn').classList.remove('active');
};

// Fungsi untuk menampilkan upload panel
window.showUploadPanel = function() {
  // Cek apakah sudah login
  const adminPanel = document.getElementById('adminPanel');
  const loginPanel = document.getElementById('loginPanel');
  
  // Jika sudah login (adminPanel visible), tampilkan upload panel
  // Jika belum, tampilkan pesan atau login panel
  if (adminPanel.style.display === 'block' || loginPanel.style.display === 'none') {
    // Already logged in or showing upload
  } else {
    // Belum login, tampilkan pesan
    alert('Silakan login terlebih dahulu');
    return;
  }
  
  document.getElementById('loginPanel').style.display = 'none';
  document.getElementById('adminPanel').style.display = 'block';
  
  // Update active button
  document.getElementById('uploadBtn').classList.add('active');
  document.getElementById('loginBtn').classList.remove('active');
};

// Modifikasi fungsi login untuk menampilkan upload panel setelah login sukses
window.login = function() {
  const user = document.getElementById('user').value;
  const pass = document.getElementById('pass').value;
  
  // Cek kredensial (sesuaikan dengan environment variables)
  const ADMIN_USER = import.meta.env.VITE_ADMIN_USER;
  const ADMIN_PASS = import.meta.env.VITE_ADMIN_PASS;
  
  if(user === ADMIN_USER && pass === ADMIN_PASS) {
    // Login sukses
    alert('Login berhasil!');
    
    // Sembunyikan login panel dan tampilkan upload panel
    document.getElementById('loginPanel').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    
    // Update active button
    document.getElementById('uploadBtn').classList.add('active');
    document.getElementById('loginBtn').classList.remove('active');
  } else {
    alert('Username atau password salah!');
  }
};

// Tambahkan fungsi untuk volume control
document.addEventListener('DOMContentLoaded', function() {
  const volumeSlider = document.getElementById('volumeSlider');
  if (volumeSlider) {
    volumeSlider.addEventListener('input', function(e) {
      const audioElements = document.querySelectorAll('audio');
      audioElements.forEach(audio => {
        audio.volume = e.target.value;
      });
    });
  }
});

// Update now playing saat audio diputar
document.addEventListener('play', function(e) {
  if (e.target.tagName === 'AUDIO') {
    const songDiv = e.target.closest('.song');
    if (songDiv) {
      const title = songDiv.querySelector('p').innerText;
      document.getElementById('nowPlaying').style.display = 'block';
      document.getElementById('nowPlayingTitle').innerText = title;
    }
  }
}, true);
</script>

</body>
</html>
